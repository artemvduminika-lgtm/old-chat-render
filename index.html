<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messenger</title>
<style>
body { margin:0; font-family:sans-serif; background:#36393f; color:white; }
.container { display:flex; height:100vh; }
.sidebar { width:250px; background:#2f3136; padding:10px; }
.contact { padding:10px; cursor:pointer; border-radius:5px; display:flex; justify-content:space-between; }
.contact:hover { background:#40444b; }
.unread { color:#43b581; }
.chat { flex:1; display:flex; flex-direction:column; }
.messages { flex:1; padding:10px; overflow:auto; }
.input { display:flex; padding:10px; background:#40444b; }
input { flex:1; padding:10px; border:none; border-radius:5px; }


@media (max-width: 700px) {
  .container { flex-direction: column; }

  .sidebar {
    width: 100%;
    height: 120px;
    overflow-x: auto;
    display: flex;
    gap: 10px;
  }

  .contact {
    min-width: 120px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .chat {
    flex: 1;
  }

  .messages {
    height: calc(100vh - 200px);
  }

  .input {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
  }

  input {
    font-size: 16px; /* предотвращает zoom на iOS */
  }
}
</style>
</head>
<body>

<div class="container">
<div class="sidebar">
<h3>Contacts</h3>
<div id="contacts"></div>
<input id="newContact" placeholder="Add" />
</div>

<div class="chat">
<div id="messages" class="messages"></div>
<div class="input">
<input id="msg" placeholder="Message" />
</div>
</div>
</div>

<script>
const username = prompt("Username:");
const ws = new WebSocket("ws://192.168.1.104:8765");

let current = null;
let contactsList = [];
let unread = {};

ws.onopen = ()=> ws.send(JSON.stringify({username}));

ws.onmessage = e => {
    const d = JSON.parse(e.data);

    if(d.type === "init"){
        contactsList = d.contacts;
        d.unread.forEach(u => unread[u]=true);
        renderContacts();
    }

    if(d.type === "contacts"){
        contactsList = d.contacts;
        renderContacts();
    }

    if(d.type === "history"){
        messages.innerHTML="";
        d.messages.forEach(m=>addMsg(m[0]+": "+m[1]));
        unread[current]=false;
        renderContacts();
    }

    if(d.type === "private"){
        if(d.from === current){
            addMsg(d.from+": "+d.message);
        } else {
            unread[d.from] = true;
            renderContacts();
        }
    }
};

function renderContacts(){
    contacts.innerHTML="";
    contactsList.forEach(u=>{
        const div=document.createElement("div");
        div.className="contact";
        div.innerHTML = `<span>${u}</span><span class="${unread[u]?"unread":""}">${unread[u]?"●":""}</span>`;
        div.onclick=()=>select(u);
        contacts.appendChild(div);
    });
}

function select(u){
    current=u;
    ws.send(JSON.stringify({type:"load_history", username:u}));
}

function send(){
    if(!current || !msg.value) return;
    ws.send(JSON.stringify({type:"private", to:current, message:msg.value}));
    addMsg("Me: "+msg.value);
    msg.value="";
}

function addMsg(t){
    const d=document.createElement("div");
    d.textContent=t;
    messages.appendChild(d);
    messages.scrollTop=messages.scrollHeight;
}

msg.addEventListener("keydown",e=>{ if(e.key==="Enter") send(); });
newContact.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        ws.send(JSON.stringify({type:"add_contact", username:newContact.value}));
        newContact.value="";
    }
});
</script>

</body>
</html>
