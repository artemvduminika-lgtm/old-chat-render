<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
</head>
<body>

<h3>Chat</h3>

<div id="chat" style="height:250px; overflow-y:scroll; border:1px solid black;"></div>

<input id="message" type="text" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<h4>Online users:</h4>
<ul id="users"></ul>

<script>
    const username = prompt("Your name:");
    const room = prompt("Room name:", "general");

    const ws = new WebSocket("ws://localhost:8765");

    const chat = document.getElementById("chat");
    const usersList = document.getElementById("users");

    ws.onopen = () => {
        ws.send(JSON.stringify({
            username: username,
            room: room
        }));
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "history") {
            data.messages.forEach(msg => {
                addMessage(`${msg[0]}: ${msg[1]}`);
            });
        }

        if (data.type === "message") {
            addMessage(`[${data.time}] ${data.user}: ${data.message}`);
        }

        if (data.type === "system") {
            addMessage(`[SYSTEM] ${data.message}`);
        }

        if (data.type === "users") {
            updateUsers(data.users);
        }
    };

    function addMessage(text) {
        const div = document.createElement("div");
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function updateUsers(users) {
        usersList.innerHTML = "";
        users.forEach(user => {
            const li = document.createElement("li");
            li.textContent = user;
            usersList.appendChild(li);
        });
    }

    function sendMessage() {
        const input = document.getElementById("message");
        if (!input.value) return;

        ws.send(JSON.stringify({
            message: input.value
        }));

        input.value = "";
    }

    document.getElementById("message").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
